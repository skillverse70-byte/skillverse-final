          description: ''
  /api/admin/ai/provider-health/:
    get:
      operationId: admin_ai_provider_health
      parameters:
      - in: query
        name: mode
        schema:
          enum:
          - config
          - live
          - completion
          type: string
          default: config
          minLength: 1
        description: |-
          * `config` - config
          * `live` - live
          * `completion` - completion
      tags:
      - ai
      - admin
      security:
      - cookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
