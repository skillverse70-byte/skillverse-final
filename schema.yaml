          type: array
          items:
            $ref: '#/components/schemas/UserSkill'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - field_interests
      - skills
      - updated_at
      - user
    RegularUserProfileUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 255
        bio:
          type: string
        interests_summary:
          type: string
        experience_level:
          oneOf:
          - $ref: '#/components/schemas/ExperienceLevelEnum'
          - $ref: '#/components/schemas/BlankEnum'
    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    ReviewEligibility:
      type: object
      properties:
        context:
          $ref: '#/components/schemas/ContextEnum'
        source_id:
          type: integer
        eligible:
          type: boolean
        reason:
          type: string
        existing_review_id:
          type: integer
          nullable: true
        target:
          allOf:
          - $ref: '#/components/schemas/ReviewTarget'
          nullable: true
      required:
      - context
      - eligible
      - existing_review_id
      - reason
      - source_id
      - target
    ReviewTarget:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        title:
          type: string
      required:
      - id
    RoleEnum:
      enum:
      - guest
      - regular_user
      - organization
      - admin
      type: string
      description: |-
        * `guest` - Guest
        * `regular_user` - Regular User
        * `organization` - Organization
        * `admin` - Admin
    SessionParticipant:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
      required:
      - full_name
      - id
    Skill:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          readOnly: true
      required:
      - description
      - id
      - name
      - slug
    SkillSwapActionRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 255
    SkillSwapRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        requester:
          allOf:
          - $ref: '#/components/schemas/SwapParticipant'
          readOnly: true
        recipient:
          allOf:
          - $ref: '#/components/schemas/SwapParticipant'
          readOnly: true
        counterparty:
          allOf:
          - $ref: '#/components/schemas/SwapParticipant'
          readOnly: true
        my_role:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/SkillSwapStatusEnum'
          readOnly: true
        my_teaching_skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
          readOnly: true
        my_learning_skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
          readOnly: true
        exchange_summary:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true
        requester_note:
          type: string
          readOnly: true
        recipient_note:
          type: string
          readOnly: true
        cancelled_reason:
          type: string
          readOnly: true
        match_suggestion:
          type: integer
          readOnly: true
          nullable: true
        responded_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        can_accept:
          type: boolean
          readOnly: true
        can_reject:
          type: boolean
          readOnly: true
        can_cancel:
          type: boolean
          readOnly: true
        status_history:
          type: array
          items:
            $ref: '#/components/schemas/SkillSwapStatusHistory'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - can_accept
      - can_cancel
      - can_reject
      - cancelled_reason
      - counterparty
      - created_at
      - exchange_summary
      - id
      - match_suggestion
      - message
      - my_learning_skills
      - my_role
      - my_teaching_skills
      - recipient
      - recipient_note
      - requester
      - requester_note
      - responded_at
      - status
      - status_history
      - updated_at
    SkillSwapRequestCreateRequest:
      type: object
      properties:
        recipient_user_id:
          type: integer
        match_suggestion_id:
          type: integer
        message:
          type: string
        requester_note:
          type: string
          maxLength: 255
      required:
      - recipient_user_id
    SkillSwapStatusEnum:
      enum:
      - pending
      - accepted
      - rejected
      - cancelled
      - completed
      type: string
      description: |-
        * `pending` - Pending
        * `accepted` - Accepted
        * `rejected` - Rejected
        * `cancelled` - Cancelled
        * `completed` - Completed
    SkillSwapStatusHistory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        from_status:
          allOf:
          - $ref: '#/components/schemas/SkillSwapStatusEnum'
          readOnly: true
        to_status:
          allOf:
          - $ref: '#/components/schemas/SkillSwapStatusEnum'
          readOnly: true
        note:
          type: string
          readOnly: true
        changed_by_user:
          allOf:
          - $ref: '#/components/schemas/SwapParticipant'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - changed_by_user
      - created_at
      - from_status
      - id
      - note
      - to_status
    SuggestionTypeEnum:
      enum:
      - direct_swap
      - partial_overlap
      - field_relevant
      type: string
      description: |-
        * `direct_swap` - Direct Swap
        * `partial_overlap` - Partial Overlap
        * `field_relevant` - Field Relevant
    SwapParticipant:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        bio:
          type: string
        interests_summary:
          type: string
        experience_level:
          type: string
      required:
      - bio
      - experience_level
      - full_name
      - id
      - interests_summary
    TestEmailRequestRequest:
      type: object
      properties:
        to_email:
          type: string
          format: email
          minLength: 1
        subject:
          type: string
          minLength: 1
          default: SkillVerse Resend test email
        message:
          type: string
          minLength: 1
          default: This is a test email from SkillVerse using the configured Resend
            email backend.
    ThreadMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          readOnly: true
        content:
          type: string
          readOnly: true
        resource_url:
          type: string
          format: uri
          readOnly: true
        resource_label:
          type: string
          readOnly: true
        sender:
          allOf:
          - $ref: '#/components/schemas/ThreadMessageSender'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - message_type
      - resource_label
      - resource_url
      - sender
      - updated_at
    ThreadMessageCreateRequest:
      type: object
      properties:
        content:
          type: string
        resource_url:
          type: string
          format: uri
        resource_label:
          type: string
          maxLength: 255
    ThreadMessageSender:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
      required:
      - full_name
      - id
    TokenPairWithUserResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
      - access
      - refresh
      - user
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
      required:
      - access
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - refresh
    UserFieldInterest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        field_interest:
          allOf:
          - $ref: '#/components/schemas/FieldInterest'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - field_interest
      - id
    UserFieldInterestCreateRequest:
      type: object
      properties:
        field_interest_id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 120
    UserSkill:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        skill:
          allOf:
          - $ref: '#/components/schemas/Skill'
          readOnly: true
        direction:
          $ref: '#/components/schemas/DirectionEnum'
        experience_note:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - direction
      - id
      - skill
      - updated_at
    UserSkillCreateRequest:
      type: object
      properties:
        skill_id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 120
        direction:
          $ref: '#/components/schemas/DirectionEnum'
        experience_note:
          type: string
          maxLength: 255
      required:
      - direction
    VerifyEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - code
      - email
    VerifyEmailResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
      - access
      - refresh
      - user
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
