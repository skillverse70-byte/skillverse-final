components:
  schemas:
    AIAdaptiveFocusDrift:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/LevelEnum'
        score:
          type: integer
        rationale:
          type: string
        source_signal_keys:
          type: array
          items:
            type: string
      required:
      - level
      - rationale
      - score
      - source_signal_keys
    AIAdaptiveMonitoringCheckInRequest:
      type: object
      properties:
        course_id:
          type: integer
          minimum: 1
          nullable: true
        surface:
          type: string
          maxLength: 64
        mood_label:
          allOf:
          - $ref: '#/components/schemas/MoodLabelEnum'
          default: steady
        focus_level:
          type: integer
          maximum: 5
          minimum: 1
          nullable: true
        energy_level:
          type: integer
          maximum: 5
          minimum: 1
          nullable: true
        stress_level:
          type: integer
          maximum: 5
          minimum: 1
          nullable: true
        reflection_note:
          type: string
          maxLength: 1000
    AIAdaptiveMonitoringSignalSummary:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        value: {}
        explanation:
          type: string
        confidence:
          type: string
      required:
      - confidence
      - explanation
      - key
      - label
      - value
    AIAdaptiveMonitoringState:
      type: object
      properties:
        actor_role:
          $ref: '#/components/schemas/RoleEnum'
        target_user:
          $ref: '#/components/schemas/AIAdaptiveMonitoringTargetUser'
        policy:
          $ref: '#/components/schemas/AICognitiveMonitoringPolicy'
        monitoring_active:
          type: boolean
        fallback_active:
          type: boolean
        used_ai:
          type: boolean
        surface:
          type: string
        active_signal_keys:
          type: array
          items:
            type: string
        signals:
          type: array
          items:
            $ref: '#/components/schemas/AIAdaptiveMonitoringSignalSummary'
        focus_drift:
          $ref: '#/components/schemas/AIAdaptiveFocusDrift'
        mood_mirror:
          $ref: '#/components/schemas/AIAdaptiveMoodMirror'
        adaptive_responses:
          type: array
          items:
            $ref: '#/components/schemas/AIAdaptiveResponse'
        generated_at:
          type: string
          format: date-time
      required:
      - active_signal_keys
      - actor_role
      - adaptive_responses
      - fallback_active
      - focus_drift
      - generated_at
      - monitoring_active
      - mood_mirror
      - policy
      - signals
      - surface
      - target_user
      - used_ai
    AIAdaptiveMonitoringTargetUser:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - full_name
      - id
      - role
    AIAdaptiveMoodMirror:
      type: object
      properties:
        state:
          type: string
        label:
          type: string
        confidence:
          type: string
        rationale:
          type: string
        self_report:
          allOf:
          - $ref: '#/components/schemas/AIAdaptiveMoodMirrorSelfReport'
          nullable: true
        source_signal_keys:
          type: array
          items:
            type: string
      required:
      - confidence
      - label
      - rationale
      - self_report
      - source_signal_keys
      - state
    AIAdaptiveMoodMirrorSelfReport:
      type: object
      properties:
        id:
          type: integer
        mood_label:
          $ref: '#/components/schemas/MoodLabelEnum'
        focus_level:
          type: integer
          nullable: true
        energy_level:
          type: integer
          nullable: true
        stress_level:
          type: integer
          nullable: true
        reflection_note:
          type: string
        surface:
          type: string
        course_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - course_id
      - created_at
      - energy_level
      - focus_level
      - id
      - mood_label
      - reflection_note
      - stress_level
      - surface
    AIAdaptiveResponse:
      type: object
      properties:
        key:
          type: string
        priority:
          type: string
        title:
          type: string
        detail:
          type: string
        action_type:
          type: string
        route:
          type: string
        source_signal_keys:
          type: array
          items:
            type: string
      required:
      - action_type
      - detail
      - key
      - priority
      - route
      - source_signal_keys
      - title
    AIAssignmentFeedback:
      type: object
      properties:
        lesson_id:
          type: integer
        lesson_title:
          type: string
        item_type:
          $ref: '#/components/schemas/LessonItemTypeEnum'
        readiness:
          type: string
        feedback:
          type: string
        checklist:
          type: array
          items:
            type: string
        source_signals: {}
        used_ai:
          type: boolean
      required:
      - checklist
      - feedback
      - item_type
      - lesson_id
      - lesson_title
      - readiness
      - source_signals
      - used_ai
    AICapabilitySnapshot:
      type: object
      properties:
        provider:
          type: string
        actor_role:
          type: string
        global_enabled:
          type: boolean
        provider_configured:
          type: boolean
        fallback_contract: {}
        integration_rules: {}
        features:
          type: array
          items:
            $ref: '#/components/schemas/AIFeatureCapability'
      required:
      - actor_role
      - fallback_contract
      - features
      - global_enabled
      - integration_rules
      - provider
      - provider_configured
    AICognitiveMonitoringAdminOverview:
      type: object
      properties:
        policy:
          $ref: '#/components/schemas/AICognitiveMonitoringPolicy'
        summary:
          $ref: '#/components/schemas/AICognitiveMonitoringAdminSummary'
        signal_counts:
          type: array
          items:
            $ref: '#/components/schemas/AICognitiveMonitoringAdminSignalCount'
        recent_records:
          type: array
          items:
            $ref: '#/components/schemas/AICognitiveMonitoringAdminRecord'
      required:
      - policy
      - recent_records
      - signal_counts
      - summary
    AICognitiveMonitoringAdminRecord:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: '#/components/schemas/CertificateStatusEnum'
        policy_version:
          type: string
        allowed_signals:
          type: array
          items:
            type: string
        surfaces:
          type: array
          items:
            type: string
        source_surface:
          type: string
        disclosure_acknowledged:
          type: boolean
        granted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_reason:
          type: string
        metadata: {}
        user: {}
      required:
      - allowed_signals
      - disclosure_acknowledged
      - granted_at
      - id
      - metadata
      - policy_version
      - revoked_at
      - revoked_reason
      - source_surface
      - status
      - surfaces
      - user
    AICognitiveMonitoringAdminSignalCount:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        count:
          type: integer
      required:
      - count
      - key
      - label
    AICognitiveMonitoringAdminSummary:
      type: object
      properties:
        active_consents:
          type: integer
        revoked_consents:
          type: integer
        distinct_consented_users:
          type: integer
        currently_monitored_users:
          type: integer
      required:
      - active_consents
      - currently_monitored_users
      - distinct_consented_users
      - revoked_consents
    AICognitiveMonitoringConsentRecord:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: '#/components/schemas/CertificateStatusEnum'
        policy_version:
          type: string
        allowed_signals:
          type: array
          items:
            type: string
        surfaces:
          type: array
          items:
            type: string
        source_surface:
          type: string
        disclosure_acknowledged:
          type: boolean
        granted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_reason:
          type: string
        metadata: {}
      required:
      - allowed_signals
      - disclosure_acknowledged
      - granted_at
      - id
      - metadata
      - policy_version
      - revoked_at
      - revoked_reason
      - source_surface
      - status
      - surfaces
    AICognitiveMonitoringConsentRevokeRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 255
    AICognitiveMonitoringConsentUpdateRequest:
      type: object
      properties:
        allowed_signals:
          type: array
          items:
            type: string
            minLength: 1
          maxItems: 7
        acknowledged_disclosure:
          type: boolean
        source_surface:
          type: string
          maxLength: 64
      required:
      - acknowledged_disclosure
      - allowed_signals
    AICognitiveMonitoringConsentView:
      type: object
      properties:
        feature_key:
          $ref: '#/components/schemas/FeatureKeyEnum'
        actor_role:
          $ref: '#/components/schemas/RoleEnum'
        policy:
          $ref: '#/components/schemas/AICognitiveMonitoringPolicy'
        is_consented:
          type: boolean
